            </div>
            <nav style={{ flex: 1, display: "flex", flexDirection: "column", gap: 4 }}>
              {NAV.map(n => (
                <button key={n.id} onClick={() => setNav(n.id)} className={"at-navitem" + (nav === n.id ? " active" : "")}>
                  <span style={{ fontSize: 15, color: nav === n.id ? "#fff" : n.color }}><n.icon /></span>
                  {n.label}
                </button>
              ))}
            </nav>
            <div style={{ borderTop: "1px solid rgba(255,255,255,.1)", paddingTop: 16, marginTop: 16 }}>
              <button onClick={onExit} className="at-navitem" style={{ color: "var(--muted)" }}>
                <span style={{ fontSize: 18 }}><LogOut /></span>
                Exit admin
              </button>
            </div>
          </aside>

          <main style={{ flex: 1, padding: 32, minWidth: 0 }}>
            {nav === "dashboard" && <Dashboard products={products} orders={orders} money={money} onReset={onReset} isSuperAdmin={isSuperAdmin} />}
            {nav === "pos" && <POS products={products} settings={settings} money={money} placeOrder={placeOrder} notify={notify} currentUser={currentUser} />}
            {nav === "products" && <Products products={products} money={money} notify={notify} />}
            {nav === "orders" && <Orders orders={orders} money={money} notify={notify} isSuperAdmin={isSuperAdmin} />}
            {nav === "settings" && <Settings settings={settings} notify={notify} />}
            {nav === "users" && isSuperAdmin && <Users staff={staff} currentUser={currentUser} notify={notify} />}
          </main>
        </div>
      );
    }

    function Dashboard({ products, orders, money, onReset, isSuperAdmin }) {
      const [confirmReset, setConfirmReset] = useState(false);
      const totalRevenue = orders.reduce((s, o) => o.status === "delivered" || o.status === "paid" ? s + o.total : s, 0);
      const pendingOrders = orders.filter(o => o.status === "pending" || o.status === "paid").length;
      const lowStock = products.filter(p => p.stock > 0 && p.stock <= 5).length;
      const outOfStock = products.filter(p => p.stock === 0).length;

      const daily = useMemo(() => {
        const today = new Date(); today.setHours(0, 0, 0, 0);
        return Array.from({ length: 7 }, (_, i) => {
          const start = new Date(today); start.setDate(start.getDate() - (6 - i));
          const startTs = start.getTime(), endTs = startTs + 86400000;
          const dayOrders = orders.filter(o => o.createdAt >= startTs && o.createdAt < endTs);
          return {
            label: start.toLocaleDateString(undefined, { weekday: "short" }),
            revenue: dayOrders.reduce((s, o) => s + o.total, 0),
            count: dayOrders.length,
          };
        });
      }, [orders]);
      const weekRevenue = daily.reduce((s, d) => s + d.revenue, 0);
      const weekOrders = daily.reduce((s, d) => s + d.count, 0);

      return (
        <div style={{ maxWidth: 1100 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 28 }}>
            <div>
              <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                <span style={{ width: 40, height: 40, borderRadius: 10, background: "rgba(91,141,239,.14)", color: "#5B8DEF", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18 }}><LayoutDashboard /></span>
                <h1 className="at-disp" style={{ fontSize: 28, fontWeight: 700, margin: 0 }}>Dashboard</h1>
              </div>
              <p style={{ color: "var(--muted)", marginTop: 4, fontSize: 14 }}>Overview of your store</p>
            </div>
            {isSuperAdmin && (
              <button onClick={() => setConfirmReset(true)} className="at-btn at-btn-ghost">
                <RotateCcw /> Reset demo
              </button>
            )}
          </div>

          {confirmReset && (
            <>
              <div className="at-scrim" onClick={() => setConfirmReset(false)} />
              <div className="at-modal">
                <div className="at-card at-rise" style={{ width: "100%", maxWidth: 420, padding: 24 }} onClick={e => e.stopPropagation()}>
                  <h2 className="at-disp" style={{ fontSize: 18, fontWeight: 700, marginBottom: 10 }}>Reset all store data?</h2>
                  <p style={{ color: "var(--muted)", fontSize: 13, lineHeight: 1.6 }}>This wipes <b>all</b> your real products and orders — including anything you've deleted or added — and replaces them with fresh sample data. This can't be undone.</p>
                  <div style={{ display: "flex", gap: 8, marginTop: 20, justifyContent: "flex-end" }}>
                    <button onClick={() => setConfirmReset(false)} className="at-btn at-btn-ghost">Cancel</button>
                    <button onClick={() => { onReset(); setConfirmReset(false); }} className="at-btn at-btn-primary" style={{ background: "var(--warn)" }}>Reset everything</button>
                  </div>
                </div>
              </div>
            </>
          )}

          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(200px,1fr))", gap: 16, marginBottom: 24 }}>
            <div className="at-card" style={{ padding: 20, borderTop: "3px solid var(--accent)" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12 }}>
                <span style={{ width: 32, height: 32, borderRadius: 8, background: "var(--accent-tint)", color: "var(--accent)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 15 }}><DollarSign /></span>
                <div className="at-eyebrow">Total revenue</div>
              </div>
              <div className="at-stat-num">{money(totalRevenue)}</div>
              <div style={{ display: "flex", alignItems: "center", gap: 6, marginTop: 12, color: "var(--live)", fontSize: 13 }}>
                <TrendingUp />
                All time
              </div>
            </div>
            <div className="at-card" style={{ padding: 20, borderTop: "3px solid #5B3A56" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12 }}>
                <span style={{ width: 32, height: 32, borderRadius: 8, background: "#F3E9F1", color: "#5B3A56", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 15 }}><Receipt /></span>
                <div className="at-eyebrow">Orders to fulfill</div>
              </div>
              <div className="at-stat-num">{pendingOrders}</div>
              <div style={{ marginTop: 12, color: "var(--muted)", fontSize: 13 }}>
                Pending + Paid
              </div>
            </div>
            <div className="at-card" style={{ padding: 20, borderTop: "3px solid var(--warn)" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12 }}>
                <span style={{ width: 32, height: 32, borderRadius: 8, background: "var(--warn-tint)", color: "var(--warn)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 15 }}><AlertTriangle /></span>
                <div className="at-eyebrow">Low stock</div>
              </div>
              <div className="at-stat-num" style={{ color: lowStock > 0 ? "var(--warn)" : "inherit" }}>{lowStock}</div>
              <div style={{ marginTop: 12, color: "var(--muted)", fontSize: 13 }}>
                Products running low
              </div>
            </div>
            <div className="at-card" style={{ padding: 20, borderTop: "3px solid #46505C" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12 }}>
                <span style={{ width: 32, height: 32, borderRadius: 8, background: "#EEF0F2", color: "#46505C", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 15 }}><Boxes /></span>
                <div className="at-eyebrow">Out of stock</div>
              </div>
              <div className="at-stat-num" style={{ color: outOfStock > 0 ? "var(--warn)" : "inherit" }}>{outOfStock}</div>
              <div style={{ marginTop: 12, color: "var(--muted)", fontSize: 13 }}>
                Need restocking
              </div>
            </div>
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr", gap: 24 }}>
            <div className="at-card" style={{ padding: 24 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
                <div className="at-eyebrow">Revenue — last 7 days</div>
                <div className="at-mono" style={{ fontSize: 15, fontWeight: 700 }}>{money(weekRevenue)}</div>
              </div>
              <div style={{ marginTop: 16 }}>
                <TrendBars data={daily} valueKey="revenue" color="var(--accent)" format={money} />
              </div>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginTop: 28 }}>
                <div className="at-eyebrow">Orders — last 7 days</div>
                <div className="at-mono" style={{ fontSize: 15, fontWeight: 700 }}>{weekOrders}</div>
              </div>
              <div style={{ marginTop: 16 }}>
                <TrendBars data={daily} valueKey="count" color="var(--live)" />
              </div>
            </div>
            <div className="at-card" style={{ padding: 24 }}>
              <div className="at-eyebrow" style={{ marginBottom: 16 }}>Recent orders</div>
              <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                {orders.slice(0, 5).map(o => (
                  <div key={o.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", paddingBottom: 12, borderBottom: "1px solid var(--line)" }}>
                    <div>
                      <div className="at-mono" style={{ fontSize: 12 }}>{o.id}</div>
                      <div style={{ fontSize: 13, color: "var(--muted)" }}>{o.customer.name}</div>
                    </div>
                    <div style={{ textAlign: "right" }}>
                      <div className="at-mono">{money(o.total)}</div>
                      <span className="at-badge" style={{ background: STATUS_META[o.status].bg, color: STATUS_META[o.status].fg, fontSize: 10 }}>
                        {STATUS_META[o.status].label}
                      </span>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      );
    }

    function POS({ products, settings, money, placeOrder, notify, currentUser }) {
      const [cart, setCart] = useState([]);
      const [cat, setCat] = useState("All");
      const [q, setQ] = useState("");
      const [customerName, setCustomerName] = useState("");
      const [payMethod, setPayMethod] = useState("cash");
      const [trxId, setTrxId] = useState("");
      const [receipt, setReceipt] = useState(null);
      const needsTrxId = payMethod === "bkash" || payMethod === "nagad";
      const mobileBankingNumber = payMethod === "bkash" ? settings.bkashNumber : payMethod === "nagad" ? settings.nagadNumber : "";

      const sellable = useMemo(() => {
        let list = products.filter(p => p.status === "active" && p.stock > 0);
        if (cat !== "All") list = list.filter(p => p.category === cat);
        if (q.trim()) list = list.filter(p => (p.name + p.category).toLowerCase().includes(q.toLowerCase()));
        return list;
      }, [products, cat, q]);

      const addToCart = (product, size) => {
        setCart(c => {
          const key = product.id + "|" + size;
          const existing = c.find(i => i.key === key);
          if (existing) {
            if (existing.qty + 1 > product.stock) { notify(`Only ${product.stock} left of ${product.name}`); return c; }
            return c.map(i => i.key === key ? { ...i, qty: i.qty + 1 } : i);
          }
          return [...c, { key, id: product.id, name: product.name, category: product.category, size, price: product.price, colorKey: product.colorKey, image: product.image, qty: 1 }];
        });
      };
      const updateQty = (key, d) => setCart(c => c.map(i => i.key === key ? { ...i, qty: Math.max(1, i.qty + d) } : i));
      const removeItem = (key) => setCart(c => c.filter(i => i.key !== key));

      const subtotal = cart.reduce((s, i) => s + i.price * i.qty, 0);
      const itemCount = cart.reduce((s, i) => s + i.qty, 0);

      const completeSale = () => {
        if (!cart.length || (needsTrxId && trxId.trim().length < 6)) return;
        const order = {
          id: "ORD-" + Math.floor(1000 + Math.random() * 9000),
          createdAt: Date.now(),
          items: cart.map(({ key, ...rest }) => rest),
          subtotal, shipping: 0, total: subtotal,
          status: "paid",
          customer: { name: customerName.trim() || "Walk-in customer", email: "-", address: "In-store purchase" },
          payment: needsTrxId ? { method: payMethod, trxId: trxId.trim(), number: mobileBankingNumber } : { method: payMethod },
          channel: "pos",
          cashier: currentUser?.name || "",
        };
        placeOrder(order);
        setReceipt(order);
        setCart([]); setCustomerName(""); setPayMethod("cash"); setTrxId("");
        notify(`Sale completed · ${money(subtotal)}`);
      };

      const PAY_METHODS = [{ id: "cash", label: "Cash" }, { id: "card", label: "Card" }, { id: "bkash", label: "bKash" }, { id: "nagad", label: "Nagad" }];

      return (
        <div style={{ maxWidth: 1300 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 24 }}>
            <span style={{ width: 40, height: 40, borderRadius: 10, background: "rgba(46,139,87,.14)", color: "#2E8B57", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18 }}><ShoppingCart /></span>
            <div>
              <h1 className="at-disp" style={{ fontSize: 28, fontWeight: 700, margin: 0 }}>Point of Sale</h1>
              <p style={{ color: "var(--muted)", marginTop: 4, fontSize: 14 }}>Ring up an in-store sale</p>
            </div>
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "1.6fr 1fr", gap: 20, alignItems: "flex-start" }}>
            <div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 10, marginBottom: 16, justifyContent: "space-between" }}>
                <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                  {["All", ...CATEGORIES].map(c => (
                    <button key={c} onClick={() => setCat(c)} className="at-btn at-btn-sm" style={{ background: cat === c ? "var(--accent)" : "transparent", color: cat === c ? "#fff" : "var(--ink-soft)", border: cat === c ? "none" : "1px solid var(--line-strong)" }}>{c}</button>
                  ))}
                </div>
                <div style={{ position: "relative" }}>
                  <span style={{ position: "absolute", left: 11, top: "50%", transform: "translateY(-50%)", color: "var(--muted)", fontSize: 16 }}><Search /></span>
                  <input value={q} onChange={e => setQ(e.target.value)} placeholder="Search products" className="at-field" style={{ paddingLeft: 34, width: 200 }} />
                </div>
              </div>

              {sellable.length === 0 ? (
                <div className="at-card" style={{ padding: "60px 24px", textAlign: "center", color: "var(--muted)" }}>
                  Nothing in stock matches that.
                </div>
              ) : (
                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(170px,1fr))", gap: 14 }}>
                  {sellable.map(p => (
                    <div key={p.id} className="at-card" style={{ overflow: "hidden" }}>
                      <div style={{ aspectRatio: "1/1", background: "var(--paper)" }}><ProductImage product={p} /></div>
                      <div style={{ padding: 10 }}>
                        <div style={{ fontSize: 13, fontWeight: 600, lineHeight: 1.25 }}>{p.name}</div>
                        <div className="at-mono" style={{ fontSize: 12, marginTop: 4, marginBottom: 8 }}>{money(p.price)} <span style={{ color: "var(--muted)" }}>· {p.stock} left</span></div>
                        <div style={{ display: "flex", flexWrap: "wrap", gap: 5 }}>
                          {p.sizes.map(s => (
                            <button key={s} onClick={() => addToCart(p, s)} className="at-mono" style={{ padding: "5px 9px", fontSize: 11, border: "1px solid var(--line-strong)", borderRadius: 2, background: "transparent" }}>{s}</button>
                          ))}
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>

            <div className="at-card" style={{ padding: 20, position: "sticky", top: 24 }}>
              <div className="at-eyebrow" style={{ marginBottom: 14 }}>Current sale · {itemCount} item{itemCount !== 1 ? "s" : ""}</div>

              <div style={{ maxHeight: 320, overflow: "auto", marginBottom: 14 }} className="at-scroll">
                {cart.length === 0 ? (
                  <p style={{ color: "var(--muted)", fontSize: 13, padding: "20px 0", textAlign: "center" }}>Tap a size above to add it to the sale.</p>
                ) : cart.map(i => (
                  <div key={i.key} style={{ display: "flex", gap: 10, padding: "10px 0", borderBottom: "1px solid var(--line)" }}>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontSize: 13, fontWeight: 600 }}>{i.name}</div>
                      <div className="at-mono" style={{ fontSize: 11, color: "var(--muted)" }}>Size {i.size} · {money(i.price)}</div>
                    </div>
                    <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                      <button onClick={() => updateQty(i.key, -1)} style={{ padding: "3px 7px" }}><Minus /></button>
                      <span className="at-mono" style={{ minWidth: 16, textAlign: "center", fontSize: 13 }}>{i.qty}</span>
                      <button onClick={() => updateQty(i.key, 1)} style={{ padding: "3px 7px" }}><Plus /></button>
                      <button onClick={() => removeItem(i.key)} style={{ color: "var(--muted)", marginLeft: 4 }}><Trash2 /></button>
                    </div>
                  </div>
                ))}
              </div>

              <div style={{ marginBottom: 14 }}>
                <label className="at-label">Customer (optional)</label>
                <input className="at-field" value={customerName} onChange={e => setCustomerName(e.target.value)} placeholder="Walk-in customer" />
              </div>

              <div style={{ marginBottom: 16 }}>
                <label className="at-label">Payment method</label>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 8 }}>
                  {PAY_METHODS.map(m => (
                    <button key={m.id} onClick={() => setPayMethod(m.id)} className="at-mono" style={{ padding: "9px 6px", fontSize: 11, border: "1px solid " + (payMethod === m.id ? "var(--ink)" : "var(--line-strong)"), background: payMethod === m.id ? "var(--ink)" : "transparent", color: payMethod === m.id ? "var(--paper)" : "var(--ink)", borderRadius: 2 }}>{m.label}</button>
                  ))}
                </div>
                {needsTrxId && (
                  <div style={{ marginTop: 12 }}>
                    <p className="at-mono" style={{ fontSize: 11, color: "var(--muted)", marginBottom: 8 }}>
                      Check the customer sent {money(subtotal)} to {mobileBankingNumber}, then enter their TrxID:
                    </p>
                    <input className="at-field at-mono" value={trxId} onChange={e => setTrxId(e.target.value)} placeholder="Transaction ID (TrxID)" />
                  </div>
                )}
              </div>

              <div style={{ display: "flex", justifyContent: "space-between", fontSize: 15, marginBottom: 14, paddingTop: 14, borderTop: "1px solid var(--line)" }}>
                <span className="at-disp" style={{ fontWeight: 700 }}>Total</span>
                <span className="at-mono" style={{ fontWeight: 700, fontSize: 18 }}>{money(subtotal)}</span>
              </div>

              <button onClick={completeSale} disabled={!cart.length || (needsTrxId && trxId.trim().length < 6)} className="at-btn at-btn-primary" style={{ width: "100%" }}>
                Complete sale · {money(subtotal)}
              </button>
            </div>
          </div>

          {receipt && (
            <>
              <div className="at-scrim" onClick={() => setReceipt(null)} />
              <div className="at-modal">
                <div className="at-card at-rise" style={{ width: "100%", maxWidth: 400, padding: 28, textAlign: "center" }} onClick={e => e.stopPropagation()}>
                  <div style={{ width: 52, height: 52, borderRadius: "50%", background: "var(--live-tint)", color: "var(--live)", display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 16px", fontSize: 24 }}><Check /></div>
                  <h2 className="at-disp" style={{ fontSize: 20, fontWeight: 700 }}>Sale complete</h2>
                  <div className="at-card" style={{ padding: 16, marginTop: 20, textAlign: "left", background: "var(--paper)" }}>
                    <Row label="Order number" value={receipt.id} />
                    <Row label="Items" value={receipt.items.reduce((s, i) => s + i.qty, 0)} />
                    <Row label="Payment" value={PAY_METHODS.find(m => m.id === receipt.payment.method)?.label || receipt.payment.method} />
                    {receipt.payment.trxId && <Row label="TrxID" value={receipt.payment.trxId} />}
                    <div style={{ display: "flex", justifyContent: "space-between", marginTop: 10, paddingTop: 10, borderTop: "1px solid var(--line)" }}>
                      <span className="at-disp" style={{ fontWeight: 700 }}>Total</span>
                      <span className="at-mono" style={{ fontWeight: 700 }}>{money(receipt.total)}</span>
                    </div>
                  </div>
                  <button onClick={() => setReceipt(null)} className="at-btn at-btn-dark" style={{ width: "100%", marginTop: 20 }}>Start next sale</button>
                </div>
              </div>
            </>
          )}
        </div>
      );
    }

    function Products({ products, money, notify }) {
      const [editing, setEditing] = useState(null);
      const [editForm, setEditForm] = useState({});
      const [adding, setAdding] = useState(false);
      const [addForm, setAddForm] = useState({});

      const updateProduct = (id, updates) => {
        db.collection("products").doc(id).update(updates);
        notify("Product updated");
        setEditing(null);
      };

      const addProduct = () => {
        if (!addForm.name) return;
        const p = {
          id: uid("prod"),
          name: addForm.name,
          category: addForm.category || CATEGORIES[0],
          price: Number(addForm.price) || 0,
          stock: Number(addForm.stock) || 0,
          sizes: (addForm.sizes || "One Size").split(",").map(s => s.trim()).filter(Boolean),
          description: addForm.description || "",
          status: "active",
          colorKey: products.length % SWATCHES.length,
          image: addForm.image || "",
          createdAt: Date.now(),
        };
        db.collection("products").doc(p.id).set(p);
        notify("Product added");
        setAdding(false);
        setAddForm({});
      };

      return (
        <div style={{ maxWidth: 1100 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 24 }}>
            <div>
              <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                <span style={{ width: 40, height: 40, borderRadius: 10, background: "rgba(124,139,110,.16)", color: "#7C8B6E", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18 }}><Package /></span>
                <h1 className="at-disp" style={{ fontSize: 28, fontWeight: 700, margin: 0 }}>Products</h1>
              </div>
              <p style={{ color: "var(--muted)", marginTop: 4, fontSize: 14 }}>{products.length} products</p>
            </div>
            <button onClick={() => { setAdding(true); setAddForm({}); }} className="at-btn at-btn-primary">
              <Plus /> Add product
            </button>
          </div>

          <div className="at-card" style={{ overflow: "hidden" }}>
            <table className="at-table">
              <thead>
                <tr>
                  <th>Product</th>
                  <th>Category</th>
                  <th>Price</th>
                  <th>Stock</th>
                  <th style={{ width: 80 }}></th>
                </tr>
              </thead>
              <tbody>
                {products.map(p => (
                  <tr key={p.id}>
                    <td>
                      <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                        <div style={{ width: 48, height: 48, borderRadius: 2, overflow: "hidden", background: "var(--paper)" }}>
                          <ProductImage product={p} />
                        </div>
                        <div>
                          <div style={{ fontWeight: 500 }}>{p.name}</div>
                          <div className="at-mono" style={{ fontSize: 12, color: "var(--muted)" }}>{p.id}</div>
                        </div>
                      </div>
                    </td>
                    <td>{p.category}</td>
                    <td className="at-mono">{money(p.price)}</td>
                    <td>
                      <span style={{ color: p.stock === 0 ? "var(--warn)" : p.stock <= 5 ? "var(--warn)" : "inherit" }}>
                        {p.stock} in stock
                      </span>
                    </td>
                    <td style={{ textAlign: "right" }}>
                      <button onClick={() => { setEditing(p.id); setEditForm({}); }} style={{ color: "var(--muted)", fontSize: 16 }}><Pencil /></button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          {editing && (() => {
            const p = products.find(x => x.id === editing);
            return (
              <>
                <div className="at-scrim" onClick={() => setEditing(null)} />
                <div className="at-modal">
                  <div className="at-card at-rise" style={{ width: "100%", maxWidth: 560, padding: 24 }} onClick={e => e.stopPropagation()}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
                      <h2 className="at-disp" style={{ fontSize: 20, fontWeight: 700 }}>Edit product</h2>
                      <button onClick={() => setEditing(null)} style={{ color: "var(--muted)", fontSize: 18 }}><X /></button>
                    </div>
                    <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
                      <div>
                        <label className="at-label">Name</label>
                        <input className="at-field" defaultValue={p.name} onChange={e => setEditForm({ ...editForm, name: e.target.value })} />
                      </div>
                      <div>
                        <label className="at-label">Price</label>
                        <input type="number" className="at-field at-mono" defaultValue={p.price} onChange={e => setEditForm({ ...editForm, price: Number(e.target.value) })} />
                      </div>
                      <div>
                        <label className="at-label">Stock</label>
                        <input type="number" className="at-field at-mono" defaultValue={p.stock} onChange={e => setEditForm({ ...editForm, stock: Number(e.target.value) })} />
                      </div>

    function Orders({ orders, money, notify, isSuperAdmin }) {
      const [confirmDelete, setConfirmDelete] = useState(null);
      const [selected, setSelected] = useState([]);
      const updateStatus = (id, status) => {
        db.collection("orders").doc(id).update({ status });
        notify("Order updated");
      };
      const toggleSelect = (id) => setSelected(s => s.includes(id) ? s.filter(x => x !== id) : [...s, id]);
      const toggleSelectAll = () => setSelected(s => s.length === orders.length ? [] : orders.map(o => o.id));
      const deleteOrders = (ids) => {
        const batch = db.batch();
        ids.forEach(id => batch.delete(db.collection("orders").doc(id)));
        batch.commit();
        notify(ids.length > 1 ? `${ids.length} orders removed` : "Order removed");
        setSelected(s => s.filter(id => !ids.includes(id)));
        setConfirmDelete(null);
      };
      const paymentLabel = (o) => {
        const p = o.payment || {};
        if (p.method === "cod") return "Cash on delivery";
        if (p.method === "cash") return "Cash";
        if (p.method === "card") return p.last4 ? `Card ···· ${p.last4}` : "Card";
        if (p.method === "bkash") return "bKash" + (p.trxId ? ` · ${p.trxId}` : "");
        if (p.method === "nagad") return "Nagad" + (p.trxId ? ` · ${p.trxId}` : "");
        return p.method || "-";
      };

      return (
        <div style={{ maxWidth: 1100 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 24 }}>
            <div>
              <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                <span style={{ width: 40, height: 40, borderRadius: 10, background: "rgba(214,167,86,.16)", color: "#D6A756", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18 }}><Receipt /></span>
                <h1 className="at-disp" style={{ fontSize: 28, fontWeight: 700, margin: 0 }}>Orders</h1>
              </div>
              <p style={{ color: "var(--muted)", marginTop: 4, fontSize: 14 }}>{orders.length} orders</p>
            </div>
            {isSuperAdmin && selected.length > 0 && (
              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <span className="at-mono" style={{ fontSize: 12, color: "var(--muted)" }}>{selected.length} selected</span>
                <button onClick={() => setSelected([])} className="at-btn at-btn-ghost at-btn-sm">Clear</button>
                <button onClick={() => setConfirmDelete(selected)} className="at-btn at-btn-sm" style={{ background: "var(--warn)", color: "#fff" }}>
                  <Trash2 /> Delete selected
                </button>
              </div>
            )}
          </div>

          <div className="at-card" style={{ overflow: "hidden" }}>
            <table className="at-table">
              <thead>
                <tr>
                  {isSuperAdmin && (
                    <th style={{ width: 32 }}>
                      <input type="checkbox" checked={orders.length > 0 && selected.length === orders.length} onChange={toggleSelectAll} />
                    </th>
                  )}
                  <th>Order</th>
                  <th>Customer</th>
                  <th>Date</th>
                  <th>Payment</th>
                  <th>Total</th>
                  <th>Status</th>
                  <th style={{ width: 120 }}></th>
                  {isSuperAdmin && <th style={{ width: 40 }}></th>}
                </tr>
              </thead>
              <tbody>
                {orders.map(o => (
                  <tr key={o.id}>
                    {isSuperAdmin && (
                      <td>
                        <input type="checkbox" checked={selected.includes(o.id)} onChange={() => toggleSelect(o.id)} />
                      </td>
                    )}
                    <td className="at-mono" style={{ fontWeight: 500 }}>{o.id}</td>
                    <td>
                      <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                        {o.customer.name}
                        {o.channel === "pos" && <span className="at-badge" style={{ background: "rgba(46,139,87,.14)", color: "#2E8B57" }}>In-store</span>}
                      </div>
                      <div style={{ fontSize: 12, color: "var(--muted)" }}>{o.customer.email}</div>
                    </td>
                    <td style={{ whiteSpace: "nowrap" }}>{timeAgo(o.createdAt)}</td>
                    <td className="at-mono" style={{ fontSize: 12 }}>{paymentLabel(o)}</td>
                    <td className="at-mono">{money(o.total)}</td>
                    <td>
                      <span className="at-badge" style={{ background: STATUS_META[o.status].bg, color: STATUS_META[o.status].fg }}>
                        {STATUS_META[o.status].label}
                      </span>
                    </td>
                    <td>
                      <select defaultValue={o.status} onChange={e => updateStatus(o.id, e.target.value)} className="at-field" style={{ padding: "6px 10px", width: "auto" }}>
                        <option value="pending">Pending</option>
                        <option value="paid">Paid</option>
                        <option value="shipped">Shipped</option>
                        <option value="delivered">Delivered</option>
                      </select>
                    </td>
                    {isSuperAdmin && (
                      <td style={{ textAlign: "right" }}>
                        <button onClick={() => setConfirmDelete([o.id])} style={{ color: "var(--muted)", fontSize: 16 }}><Trash2 /></button>
                      </td>
                    )}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          {confirmDelete && (
            <>
              <div className="at-scrim" onClick={() => setConfirmDelete(null)} />
              <div className="at-modal">
                <div className="at-card at-rise" style={{ width: "100%", maxWidth: 420, padding: 24 }} onClick={e => e.stopPropagation()}>
                  <h2 className="at-disp" style={{ fontSize: 18, fontWeight: 700, marginBottom: 10 }}>
                    {confirmDelete.length > 1 ? `Remove ${confirmDelete.length} orders?` : "Remove this order?"}
                  </h2>
                  <p style={{ color: "var(--muted)", fontSize: 13, lineHeight: 1.6 }}>
                    {confirmDelete.length > 1
                      ? `This permanently deletes ${confirmDelete.length} selected orders. This can't be undone.`
                      : <>This permanently deletes order <b className="at-mono">{confirmDelete[0]}</b>. This can't be undone.</>}
                  </p>
                  <div style={{ display: "flex", gap: 8, marginTop: 20, justifyContent: "flex-end" }}>
                    <button onClick={() => setConfirmDelete(null)} className="at-btn at-btn-ghost">Cancel</button>
                    <button onClick={() => deleteOrders(confirmDelete)} className="at-btn at-btn-primary" style={{ background: "var(--warn)" }}>
                      {confirmDelete.length > 1 ? "Delete selected" : "Delete order"}
                    </button>
                  </div>
                </div>
              </div>
            </>
          )}
        </div>
      );
    }

    function Users({ staff, currentUser, notify }) {
      const [adding, setAdding] = useState(false);
      const [form, setForm] = useState({});
      const [busy, setBusy] = useState(false);
      const [editing, setEditing] = useState(null);
      const [editForm, setEditForm] = useState({});
      const [confirmDelete, setConfirmDelete] = useState(null);
      const superAdminCount = staff.filter(u => u.role === "super_admin").length;

      const addStaff = async () => {
        if (!form.name || !form.email || !form.password) return;
        setBusy(true);
        try {
          const cred = await secondaryAuth.createUserWithEmailAndPassword(form.email.trim(), form.password);
          await db.collection("staff").doc(cred.user.uid).set({ name: form.name.trim(), email: form.email.trim(), role: form.role || "admin" });
          await secondaryAuth.signOut();
          notify("Staff account created");
          setAdding(false);
          setForm({});
        } catch (e) {
          notify(e.message);
        }
        setBusy(false);
      };

      const updateStaff = (id, updates) => {
        db.collection("staff").doc(id).update(updates);
        notify("Staff updated");
        setEditing(null);
      };

      const sendReset = (email) => {
        auth.sendPasswordResetEmail(email)
          .then(() => notify("Password reset email sent to " + email))
          .catch(e => notify(e.message));
      };

      const removeStaff = (id) => {
        db.collection("staff").doc(id).delete();
        notify("Staff access revoked");
        setConfirmDelete(null);
      };

      return (
        <div style={{ maxWidth: 900 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 24 }}>

              </div>
              <p style={{ color: "var(--muted)", marginTop: 4, fontSize: 14 }}>{staff.length} accounts · super admins can do everything, admins can't delete orders or users</p>
            </div>
            <button onClick={() => { setAdding(true); setForm({}); }} className="at-btn at-btn-primary">
              <Plus /> Add user
            </button>
          </div>

          <div className="at-card" style={{ overflow: "hidden" }}>
            <table className="at-table">
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Email</th>
                  <th>Role</th>
                  <th style={{ width: 140 }}></th>
                </tr>
              </thead>
              <tbody>
                {staff.map(u => {
                  const isSelf = u.id === currentUser.id;
                  const isLastSuperAdmin = u.role === "super_admin" && superAdminCount <= 1;
                  return (
                    <tr key={u.id}>
                      <td style={{ fontWeight: 500 }}>
                        {u.name}
                        {isSelf && <span className="at-mono" style={{ fontSize: 11, color: "var(--muted)", marginLeft: 6 }}>(you)</span>}
                      </td>
                      <td className="at-mono">{u.email}</td>
                      <td>
                        <span className="at-badge" style={{ background: u.role === "super_admin" ? "rgba(91,192,190,.15)" : "var(--accent-tint)", color: u.role === "super_admin" ? "#3A9C99" : "var(--accent)" }}>
                          {u.role === "super_admin" ? "Super admin" : "Admin"}
                        </span>
                      </td>
                      <td style={{ textAlign: "right", whiteSpace: "nowrap" }}>
                        <button onClick={() => sendReset(u.email)} title="Send password reset email" style={{ color: "var(--muted)", fontSize: 16, marginRight: 8 }}><Lock /></button>
                        <button onClick={() => { setEditing(u.id); setEditForm({}); }} style={{ color: "var(--muted)", fontSize: 16, marginRight: 8 }}><Pencil /></button>
                        {!isSelf && !isLastSuperAdmin && (
                          <button onClick={() => setConfirmDelete(u.id)} style={{ color: "var(--muted)", fontSize: 16 }}><Trash2 /></button>
                        )}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>

          {editing && (() => {
            const u = staff.find(x => x.id === editing);
            const editIsLastSuperAdmin = u.role === "super_admin" && superAdminCount <= 1;
            return (
              <>
                <div className="at-scrim" onClick={() => setEditing(null)} />
                <div className="at-modal">
                  <div className="at-card at-rise" style={{ width: "100%", maxWidth: 460, padding: 24 }} onClick={e => e.stopPropagation()}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
                      <h2 className="at-disp" style={{ fontSize: 20, fontWeight: 700 }}>Edit user</h2>
                      <button onClick={() => setEditing(null)} style={{ color: "var(--muted)", fontSize: 18 }}><X /></button>
                    </div>
                    <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
                      <div>
                        <label className="at-label">Name</label>
                        <input className="at-field" defaultValue={u.name} onChange={e => setEditForm({ ...editForm, name: e.target.value })} />
                      </div>
                      <p className="at-mono" style={{ fontSize: 11, color: "var(--muted)" }}>Email: {u.email} · use the 🔒 icon to send a password reset email — passwords can't be changed here.</p>
                      <div>
                        <label className="at-label">Role</label>
                        <select className="at-field" defaultValue={u.role} disabled={editIsLastSuperAdmin} onChange={e => setEditForm({ ...editForm, role: e.target.value })}>
                          <option value="admin">Admin — can't delete orders/users</option>
                          <option value="super_admin">Super admin — full access</option>
                        </select>
                        {editIsLastSuperAdmin && <p className="at-mono" style={{ fontSize: 11, color: "var(--muted)", marginTop: 6 }}>This is the only super admin — add another before changing this one's role.</p>}
                      </div>
                      <div style={{ display: "flex", gap: 8, marginTop: 8, justifyContent: "flex-end" }}>
                        <button onClick={() => setEditing(null)} className="at-btn at-btn-ghost">Cancel</button>
                        <button onClick={() => updateStaff(u.id, editForm)} className="at-btn at-btn-primary">Save changes</button>
                      </div>
                    </div>
                  </div>
                </div>
              </>
            );
          })()}

          {adding && (
            <>
              <div className="at-scrim" onClick={() => setAdding(false)} />
              <div className="at-modal">
                <div className="at-card at-rise" style={{ width: "100%", maxWidth: 460, padding: 24 }} onClick={e => e.stopPropagation()}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
                    <h2 className="at-disp" style={{ fontSize: 20, fontWeight: 700 }}>Add user</h2>
                    <button onClick={() => setAdding(false)} style={{ color: "var(--muted)", fontSize: 18 }}><X /></button>
                  </div>
                  <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
                    <div>
                      <label className="at-label">Name</label>
                      <input className="at-field" value={form.name || ""} onChange={e => setForm({ ...form, name: e.target.value })} placeholder="Fatima Rahman" />
                    </div>
                    <div>
                      <label className="at-label">Email</label>
                      <input className="at-field at-mono" type="email" value={form.email || ""} onChange={e => setForm({ ...form, email: e.target.value })} placeholder="fatima@yourdomain.com" />
                    </div>
                    <div>
                      <label className="at-label">Password</label>
                      <input className="at-field at-mono" type="text" value={form.password || ""} onChange={e => setForm({ ...form, password: e.target.value })} placeholder="At least 6 characters" />
                    </div>
                    <div>
                      <label className="at-label">Role</label>
                      <select className="at-field" value={form.role || "admin"} onChange={e => setForm({ ...form, role: e.target.value })}>
                        <option value="admin">Admin — can't delete orders/users</option>
                        <option value="super_admin">Super admin — full access</option>
                      </select>
                    </div>
                    <div style={{ display: "flex", gap: 8, marginTop: 8, justifyContent: "flex-end" }}>
                      <button onClick={() => setAdding(false)} className="at-btn at-btn-ghost">Cancel</button>
                      <button onClick={addStaff} disabled={busy || !form.name || !form.email || !form.password} className="at-btn at-btn-primary">{busy ? "Creating…" : "Add user"}</button>
                    </div>
                  </div>
                </div>
              </div>
            </>
          )}

          {confirmDelete && (
            <>
              <div className="at-scrim" onClick={() => setConfirmDelete(null)} />
              <div className="at-modal">
                <div className="at-card at-rise" style={{ width: "100%", maxWidth: 420, padding: 24 }} onClick={e => e.stopPropagation()}>
                  <h2 className="at-disp" style={{ fontSize: 18, fontWeight: 700, marginBottom: 10 }}>Remove this user?</h2>
                  <p style={{ color: "var(--muted)", fontSize: 13, lineHeight: 1.6 }}>They'll immediately lose access to the admin panel.</p>
                  <div style={{ display: "flex", gap: 8, marginTop: 20, justifyContent: "flex-end" }}>
                    <button onClick={() => setConfirmDelete(null)} className="at-btn at-btn-ghost">Cancel</button>
                    <button onClick={() => removeStaff(confirmDelete)} className="at-btn at-btn-primary" style={{ background: "var(--warn)" }}>Remove user</button>
                  </div>
                </div>
              </div>
            </>
          )}
        </div>
      );
    }

                <button onClick={save} className="at-btn at-btn-primary">Save settings</button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>

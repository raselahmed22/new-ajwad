@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap');

.at-root{
  --paper:#F7F2E7; --surface:#FFFFFF; --ink:#201A12; --ink-soft:#4A4030;
  --muted:#8A7F6B; --line:#E8DFC9; --line-strong:#D8CBA8;
  --accent:#6B3FA0; --accent-press:#54307F; --accent-tint:#F1E9F7;
  --gold:#C9932E; --gold-tint:#F8ECD3;
  --live:#2E8B57; --live-tint:#E4F3EA; --warn:#B4634B; --warn-tint:#FBEFE9;
  --display:'Space Grotesk',system-ui,sans-serif;
  --body:'Inter',system-ui,sans-serif;
  --mono:'Space Mono',ui-monospace,monospace;
  color:var(--ink); font-family:var(--body);
  background:var(--paper); min-height:100vh; -webkit-font-smoothing:antialiased;
}
.at-root *{box-sizing:border-box;}
.at-root button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
.at-root input,.at-root textarea,.at-root select{font-family:inherit;font-size:14px;color:var(--ink);}
.at-mono{font-family:var(--mono);font-variant-numeric:tabular-nums;}
.at-disp{font-family:var(--display);letter-spacing:-0.01em;}

/* focus + motion floor */
.at-root :focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:4px;}
@media (prefers-reduced-motion:reduce){.at-root *{animation:none!important;transition:none!important;}}

/* buttons */
.at-btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;
  font-family:var(--display);font-weight:600;font-size:13px;letter-spacing:.01em;
  padding:12px 20px;border-radius:2px;transition:transform .12s ease,background .15s ease;}
.at-btn:active{transform:translateY(1px);}
.at-btn-primary{background:var(--accent);color:#fff;}
.at-btn-primary:hover{background:var(--accent-press);}
.at-btn-dark{background:var(--ink);color:var(--paper);}
.at-btn-dark:hover{background:#000;}
.at-btn-ghost{background:transparent;color:var(--ink);border:1px solid var(--line-strong);}
.at-btn-ghost:hover{border-color:var(--ink);}
.at-btn-sm{padding:8px 14px;font-size:12px;}
.at-btn:disabled{opacity:.5;cursor:not-allowed;}

.at-eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);font-weight:600;}
.at-pulse{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--live);position:relative;}
.at-pulse::after{content:'';position:absolute;inset:0;border-radius:50%;background:var(--live);animation:atping 1.8s ease-out infinite;}
@keyframes atping{0%{transform:scale(1);opacity:.6;}100%{transform:scale(3.2);opacity:0;}}
@keyframes atrise{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
@keyframes atfade{from{opacity:0;}to{opacity:1;}}
.at-rise{animation:atrise .35s ease both;}

/* form controls */
.at-field{width:100%;padding:11px 13px;border:1px solid var(--line-strong);border-radius:2px;
  background:var(--surface);transition:border-color .15s ease;}
.at-field:focus{outline:none;border-color:var(--accent);}
.at-label{display:block;font-size:12px;font-weight:600;color:var(--ink-soft);margin-bottom:6px;}

/* cards / surfaces */
.at-card{background:var(--surface);border:1px solid var(--line);border-radius:3px;}

/* store product card */
.at-prod{background:var(--surface);border:1px solid var(--line);cursor:pointer;
  transition:border-color .18s ease,transform .18s ease;display:flex;flex-direction:column;}
.at-prod:hover{border-color:var(--accent);}
.at-prod:hover .at-prod-img{transform:scale(1.02);}
.at-prod-imgwrap{overflow:hidden;aspect-ratio:1/1;background:var(--paper);}
.at-prod-img{width:100%;height:100%;object-fit:contain;display:block;transition:transform .5s ease;}

/* overlay + drawer */
.at-scrim{position:fixed;inset:0;background:rgba(16,16,20,.5);z-index:60;animation:atfade .2s ease;}
.at-drawer{position:fixed;top:0;right:0;bottom:0;width:100%;max-width:420px;background:var(--paper);
  z-index:70;display:flex;flex-direction:column;box-shadow:-20px 0 60px rgba(0,0,0,.15);animation:atslide .28s cubic-bezier(.2,.8,.2,1);}
@keyframes atslide{from{transform:translateX(100%);}to{transform:none;}}
.at-modal{position:fixed;inset:0;z-index:70;display:flex;align-items:flex-start;justify-content:center;
  padding:24px;overflow:auto;animation:atfade .2s ease;}

/* admin nav */
.at-navitem{display:flex;align-items:center;gap:11px;width:100%;padding:10px 14px;border-radius:3px;
  font-size:14px;font-weight:500;color:var(--muted);transition:background .12s ease,color .12s ease;}
.at-navitem:hover{background:rgba(255,255,255,.06);color:#fff;}
.at-navitem.active{background:var(--accent);color:#fff;}

/* stat */
.at-stat-num{font-family:var(--mono);font-weight:700;font-size:30px;letter-spacing:-.02em;line-height:1;}

/* table */
.at-table{width:100%;border-collapse:collapse;}
.at-table th{text-align:left;font-size:11px;letter-spacing:.06em;text-transform:uppercase;
  color:var(--muted);font-weight:600;padding:12px 14px;border-bottom:1px solid var(--line);}
.at-table td{padding:14px;border-bottom:1px solid var(--line);font-size:14px;vertical-align:middle;}
.at-table tr:last-child td{border-bottom:none;}

.at-badge{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;
  padding:4px 9px;border-radius:2px;text-transform:uppercase;letter-spacing:.04em;}

.at-scroll::-webkit-scrollbar{width:8px;height:8px;}
.at-scroll::-webkit-scrollbar-thumb{background:var(--line-strong);border-radius:8px;}

@media (max-width:720px){
  .at-footer-grid{grid-template-columns:1fr !important;gap:28px !important;}
}

    const CATEGORIES = ["Tops", "Knitwear", "Outerwear", "Bottoms", "Dresses", "Accessories"];
    const SWATCHES = [
      { bg: "#1B1B20", fg: "#E9E7DF" }, { bg: "#E7E3D8", fg: "#1B1B20" },

        ["Tapered Denim", "Bottoms", 118, 22, ["28", "30", "32", "34"], "13oz Japanese selvedge, mid-rise, tapered leg."],
        ["Linen Camp Shirt", "Tops", 88, 0, ["S", "M", "L", "XL"], "Airy European linen, camp collar, patch pocket. Restocking soon."],
      ];
      return raw.map((r, i) => ({
        id: uid("prod"), name: r[0], category: r[1], price: r[2], stock: r[3],
        sizes: r[4], description: r[5], status: "active",
        colorKey: i % SWATCHES.length, image: "",
        createdAt: Date.now() - (raw.length - i) * 86400000,
      }));
    }

    function seedOrders(products) {
      const now = Date.now();
      const pick = (n) => products.filter(p => p.stock > 0)[n % products.length];
      const mk = (daysAgo, status, prodIdxs) => {
        const items = prodIdxs.map((pi, k) => {
          const p = pick(pi);
          return { id: p.id, name: p.name, size: p.sizes[0], price: p.price, qty: (k % 2) + 1, colorKey: p.colorKey };
        });
        const subtotal = items.reduce((s, it) => s + it.price * it.qty, 0);
        const shipping = subtotal > 150 ? 0 : 12;
        return {
          id: "ORD-" + Math.floor(1000 + Math.random() * 9000),
          createdAt: now - daysAgo * 86400000 - Math.floor(Math.random() * 6e7),
          items, subtotal, shipping, total: subtotal + shipping, status,
          customer: { name: ["Ava Lindqvist", "Noah Carr", "Mira Okoye", "Leo Fontaine", "Saanvi Rao"][daysAgo % 5], email: "customer@example.com", address: "12 Market St, Portland, OR" },
          payment: { brand: "Visa", last4: String(4000 + daysAgo).slice(-4) },
        };
      };
      return [
        mk(0, "paid", [0, 3]), mk(1, "shipped", [2]), mk(1, "delivered", [5, 6]),
        mk(2, "delivered", [1]), mk(3, "shipped", [4, 7]), mk(4, "delivered", [0]),
        mk(5, "delivered", [3, 6]), mk(6, "pending", [2]),
      ];
    }

    const DEFAULT_SETTINGS = { brand: "Ajwad Barakah", tagline: "Considered clothing, made to last.", currency: "BDT", symbol: "৳", shipInsideDhaka: 80, shipOutsideDhaka: 140, logo: "Ajwad Logo.png", adminUrl: "index.html#admin", address: "Dhaka, Bangladesh", phone: "01333707715", whatsapp: "01333707715", facebook: "https://www.facebook.com/profile.php?id=61590579107774", bkashNumber: "01333707715", nagadNumber: "01333707715" };

    const useMoney = (settings) => useCallback(
      (n) => settings.symbol + Number(n || 0).toLocaleString(undefined, { minimumFractionDigits: n % 1 ? 2 : 0, maximumFractionDigits: 2 }),
      [settings.symbol]
    );
    const timeAgo = (ts) => {
      const s = Math.floor((Date.now() - ts) / 1000);
      if (s < 60) return s + "s ago";
      const m = Math.floor(s / 60); if (m < 60) return m + "m ago";
      const h = Math.floor(m / 60); if (h < 24) return h + "h ago";
      return Math.floor(h / 24) + "d ago";
    };
    const STATUS_META = {
      pending: { label: "Pending", bg: "var(--warn-tint)", fg: "var(--warn)" },
      paid: { label: "Paid", bg: "var(--accent-tint)", fg: "var(--accent)" },

      delivered: { label: "Delivered", bg: "var(--live-tint)", fg: "var(--live)" },

    function ProductImage({ product, className }) {
      if (product.image) {
        return <img src={product.image} alt={product.name} className={className} style={{ width: "100%", height: "100%", objectFit: "contain" }} />;
      }
      const sw = SWATCHES[product.colorKey % SWATCHES.length];
      const words = product.name.split(" ");
      const l1 = words.slice(0, Math.ceil(words.length / 2)).join(" ");
      const l2 = words.slice(Math.ceil(words.length / 2)).join(" ");
      return (
        <div className={className} style={{ width: "100%", height: "100%", background: sw.bg, display: "flex", flexDirection: "column", justifyContent: "flex-end", padding: 24 }}>
          <div style={{ fontFamily: "'Space Mono',monospace", fontSize: 11, letterSpacing: 2, color: sw.fg, opacity: 0.7 }}>{product.category.toUpperCase()}</div>
          <div style={{ fontFamily: "'Space Grotesk',sans-serif", fontSize: 26, fontWeight: 600, color: sw.fg, marginTop: "auto" }}>
            {l1}<br/>{l2}
          </div>
        </div>
      );
    }

    function ImagePicker({ value, onChange, idSuffix }) {
      return (
        <div>
          <label className="at-label">Product image</label>
          {value && (
            <div style={{ width: 100, height: 100, borderRadius: 2, overflow: "hidden", marginBottom: 10, background: "var(--paper)" }}>
              <ProductImage product={{ image: value, name: "" }} />
            </div>
          )}
          <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
            <button type="button" onClick={() => document.getElementById("img-upload-" + idSuffix).click()} className="at-btn at-btn-ghost at-btn-sm">
              Upload from device
            </button>
            <input id={"img-upload-" + idSuffix} type="file" accept="image/*" style={{ display: "none" }}
              onChange={e => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = () => onChange(reader.result);
                reader.readAsDataURL(file);
              }} />
            {value && (
              <button type="button" onClick={() => onChange("")} className="at-btn at-btn-ghost at-btn-sm">
                Remove image
              </button>
            )}
          </div>
          <input className="at-field" style={{ marginTop: 8 }} value={value || ""} onChange={e => onChange(e.target.value)} placeholder="or paste an image URL (cloud link)" />
        </div>
      );
    }

    function App() {
      const [ready, setReady] = useState(false);
      const [products, setProducts] = useState([]);
      const [orders, setOrders] = useState([]);
      const [settings, setSettings] = useState(DEFAULT_SETTINGS);
      const [staff, setStaff] = useState([]);
      const [customerProfile, setCustomerProfile] = useState(null);
      const [staffProfile, setStaffProfile] = useState(null);
      const [mode, setMode] = useState(() => (window.location.hash === "#admin" ? "admin" : "store"));
      const [cart, setCart] = useState([]);
      const [toast, setToast] = useState(null);

      useEffect(() => {
        let productsLoaded = false, settingsLoaded = false;
        const maybeReady = () => { if (productsLoaded && settingsLoaded) setReady(true); };
        const unsubProducts = db.collection("products").onSnapshot(snap => {
          setProducts(snap.docs.map(d => d.data()));
          productsLoaded = true; maybeReady();
        });
        const unsubOrders = db.collection("orders").orderBy("createdAt", "desc").onSnapshot(snap => {
          setOrders(snap.docs.map(d => d.data()));
        });
        const unsubSettings = db.collection("settings").doc("main").onSnapshot(doc => {
          setSettings(doc.exists ? { ...DEFAULT_SETTINGS, ...doc.data() } : DEFAULT_SETTINGS);
          settingsLoaded = true; maybeReady();
        });
        const unsubStaff = db.collection("staff").onSnapshot(snap => {
          setStaff(snap.docs.map(d => ({ id: d.id, ...d.data() })));
        });
        return () => { unsubProducts(); unsubOrders(); unsubSettings(); unsubStaff(); };
      }, []);

      useEffect(() => {
        return auth.onAuthStateChanged(async (user) => {
          if (!user) { setCustomerProfile(null); setStaffProfile(null); return; }
          const [custSnap, staffSnap] = await Promise.all([
            db.collection("customers").doc(user.uid).get(),
            db.collection("staff").doc(user.uid).get(),
          ]);
          setCustomerProfile(custSnap.exists ? { id: user.uid, ...custSnap.data() } : null);
          setStaffProfile(staffSnap.exists ? { id: user.uid, ...staffSnap.data() } : null);
        });
      }, []);

      const notify = useCallback((msg) => { setToast(msg); setTimeout(() => setToast(null), 2600); }, []);

      const money = useMoney(settings);

      const signUp = useCallback(async ({ name, email, phone, location, password }) => {
        try {
          const cred = await auth.createUserWithEmailAndPassword(email.trim(), password);
          await db.collection("customers").doc(cred.user.uid).set({
            name: name.trim(), email: email.trim(), phone: phone.trim(), location, createdAt: Date.now(),
          });
          return { ok: true };
        } catch (e) {
          return { ok: false, error: e.code === "auth/email-already-in-use" ? "An account with this email already exists. Try signing in instead." : e.message };
        }
      }, []);

      const signIn = useCallback(async ({ email, password }) => {
        try {
          await auth.signInWithEmailAndPassword(email.trim(), password);
          return { ok: true };
        } catch (e) {
          return { ok: false, error: "That email/password doesn't match." };
        }
      }, []);

      const signOut = useCallback(() => auth.signOut(), []);

      const placeOrder = useCallback(async (order) => {
        await db.collection("orders").doc(order.id).set(order);
        const batch = db.batch();
        order.items.forEach(it => {
          batch.update(db.collection("products").doc(it.id), { stock: firebase.firestore.FieldValue.increment(-it.qty) });
        });
        await batch.commit();
      }, []);

      const resetAll = useCallback(async () => {
        const [prodSnap, orderSnap] = await Promise.all([db.collection("products").get(), db.collection("orders").get()]);
        const delBatch = db.batch();
        prodSnap.forEach(d => delBatch.delete(d.ref));
        orderSnap.forEach(d => delBatch.delete(d.ref));
        await delBatch.commit();
        const p = seedProducts(); const o = seedOrders(p);
        const addBatch = db.batch();
        p.forEach(item => addBatch.set(db.collection("products").doc(item.id), item));
        o.forEach(item => addBatch.set(db.collection("orders").doc(item.id), item));
        addBatch.set(db.collection("settings").doc("main"), DEFAULT_SETTINGS);
        await addBatch.commit();
        notify("Store reset to sample data");
      }, [notify]);

      if (!ready) {
        return (
          <div className="at-root" style={{ display: "flex", alignItems: "center", justifyContent: "center", height: "100vh" }}>
            <style>{STYLES}</style>
            <div style={{ textAlign: "center" }}>
              <div className="at-disp" style={{ fontSize: 22, letterSpacing: ".3em" }}>{DEFAULT_SETTINGS.brand}</div>
              <div className="at-mono" style={{ fontSize: 12, color: "var(--muted)", marginTop: 10 }}>loading your store…</div>
            </div>
          </div>
        );
      }

      return (
        <div className="at-root">
          <style>{STYLES}</style>
          {mode === "store" ? (
            <Storefront
              products={products} settings={settings} cart={cart} setCart={setCart}
              money={money} placeOrder={placeOrder} notify={notify}
              customer={customerProfile} onSignIn={signIn} onSignUp={signUp} onSignOut={signOut}
            />
          ) : (
            <Admin
              products={products} orders={orders}
              settings={settings} money={money}
              staff={staff} currentUser={staffProfile}
              notify={notify} placeOrder={placeOrder} onSignIn={signIn}
              onExit={() => { auth.signOut(); window.location.hash = ""; setMode("store"); }} onReset={resetAll}
            />
          )}
          {toast && (
            <div style={{ position: "fixed", bottom: 24, left: "50%", transform: "translateX(-50%)", background: "var(--ink)", color: "var(--paper)", padding: "12px 20px", borderRadius: 3, zIndex: 90, fontSize: 13, fontWeight: 500 }} className="at-rise">
              {toast}
            </div>
          )}
        </div>
      );
    }

    function Storefront({ products, settings, cart, setCart, money, placeOrder, notify, customer, onSignIn, onSignUp, onSignOut }) {
      const [view, setView] = useState("home");
      const [quick, setQuick] = useState(null);
      const [cartOpen, setCartOpen] = useState(false);
      const [cat, setCat] = useState("All");
      const [q, setQ] = useState("");
      const [sort, setSort] = useState("featured");
      const [confirmedOrder, setConfirmedOrder] = useState(null);
      const [authOpen, setAuthOpen] = useState(false);
      const [authMode, setAuthMode] = useState("signin");
      const [afterAuth, setAfterAuth] = useState(null);

      const cartCount = cart.reduce((s, i) => s + i.qty, 0);
      const addToCart = (product, size) => {
        setCart(c => {
          const key = product.id + "|" + size;
          const existing = c.find(i => i.key === key);
          if (existing) return c.map(i => i.key === key ? { ...i, qty: i.qty + 1 } : i);
          return [...c, { key, id: product.id, name: product.name, category: product.category, size, price: product.price, colorKey: product.colorKey, image: product.image, qty: 1 }];
        });
        setQuick(null); setCartOpen(true); notify(`Added ${product.name} (${size})`);
      };
      const updateQty = (key, d) => setCart(c => c.map(i => i.key === key ? { ...i, qty: Math.max(1, i.qty + d) } : i));
      const removeItem = (key) => setCart(c => c.filter(i => i.key !== key));

      const visible = useMemo(() => {
        let list = products.filter(p => p.status === "active");
        if (cat !== "All") list = list.filter(p => p.category === cat);
        if (q.trim()) list = list.filter(p => (p.name + p.category).toLowerCase().includes(q.toLowerCase()));
        if (sort === "low") list = [...list].sort((a, b) => a.price - b.price);
        if (sort === "high") list = [...list].sort((a, b) => b.price - a.price);
        return list;
      }, [products, cat, q, sort]);

      const subtotal = cart.reduce((s, i) => s + i.price * i.qty, 0);

      const completeOrder = (customerInfo, payment, shipping) => {
        const order = {
          id: "ORD-" + Math.floor(1000 + Math.random() * 9000),
          createdAt: Date.now(),
          items: cart.map(({ key, ...rest }) => rest),
          subtotal, shipping, total: subtotal + shipping,
          status: payment.method === "card" ? "paid" : "pending",
          customer: customerInfo, payment, customerId: customer?.id || null,
        };
        placeOrder(order); setConfirmedOrder(order); setCart([]); setView("confirm");
      };

      if (view === "checkout") {
        return <Checkout cart={cart} subtotal={subtotal} settings={settings} money={money} customer={customer}
          onBack={() => setView("home")} onComplete={completeOrder} />;
      }
      if (view === "confirm" && confirmedOrder) {
        return <Confirmation order={confirmedOrder} settings={settings} money={money} onDone={() => { setView("home"); setConfirmedOrder(null); }} />;
      }

      return (
        <div>
          <header style={{ position: "sticky", top: 0, zIndex: 40, background: "rgba(247,242,231,.85)", backdropFilter: "blur(10px)", borderBottom: "2px solid var(--accent)" }}>
            <div style={{ maxWidth: 1240, margin: "0 auto", padding: "0 24px", height: 80, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
              <button onClick={() => { setView("home"); setCat("All"); }} style={{ display: "flex", alignItems: "center", gap: 16, border: "none", background: "transparent", cursor: "pointer", padding: 0 }}>
                {settings.logo ? (
                  <>
                    <img src={settings.logo} alt={settings.brand} style={{ height: 76, width: "auto", maxWidth: 320, borderRadius: "50%" }} />
                    <span className="at-disp" style={{ fontSize: 22, fontWeight: 700, letterSpacing: ".24em" }}>{settings.brand}</span>
                  </>
                ) : (
                  <span className="at-disp" style={{ fontSize: 22, fontWeight: 700, letterSpacing: ".24em" }}>{settings.brand}</span>
                )}
              </button>
              <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
                {customer ? (
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <span style={{ fontSize: 13, color: "var(--ink-soft)" }}>Hi, {customer.name.split(" ")[0]}</span>
                    <button onClick={onSignOut} className="at-btn at-btn-ghost at-btn-sm">Sign out</button>
                  </div>
                ) : (
                  <button onClick={() => { setAuthMode("signin"); setAfterAuth(null); setAuthOpen(true); }} className="at-btn at-btn-ghost at-btn-sm">Sign in</button>
                )}
                <button onClick={() => setCartOpen(true)} style={{ position: "relative", display: "flex", alignItems: "center", gap: 8, fontSize: 24, border: "none", background: "transparent", cursor: "pointer" }}>
                  <ShoppingBag />
                  {cartCount > 0 && <span className="at-mono" style={{ position: "absolute", top: -8, right: -10, background: "var(--accent)", color: "#fff", fontSize: 10, minWidth: 17, height: 17, borderRadius: 9, display: "flex", alignItems: "center", justifyContent: "center", padding: "0 4px" }}>{cartCount}</span>}
                </button>
              </div>
            </div>
          </header>

          <section style={{ background: "linear-gradient(135deg, var(--accent-tint) 0%, var(--gold-tint) 100%)" }}>
          <div style={{ maxWidth: 1240, margin: "0 auto", padding: "56px 24px 40px" }}>
            <span className="at-eyebrow" style={{ background: "var(--accent)", color: "#fff", padding: "7px 16px", borderRadius: 20, display: "inline-block", marginBottom: 18 }}>New Season · {new Date().getFullYear()}</span>
            <h1 className="at-disp" style={{ fontSize: "clamp(38px,6vw,72px)", fontWeight: 700, lineHeight: 1.02, maxWidth: 820, margin: 0 }}>
              {settings.tagline}
            </h1>
          </div>
          </section>

          <div style={{ maxWidth: 1240, margin: "0 auto", padding: "0 24px" }}>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 10, alignItems: "center", paddingBottom: 20, borderBottom: "1px solid var(--line)", justifyContent: "space-between" }}>
              <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                {["All", ...CATEGORIES].map(c => (
                  <button key={c} onClick={() => setCat(c)} className="at-btn at-btn-sm" style={{ background: cat === c ? "var(--accent)" : "transparent", color: cat === c ? "#fff" : "var(--ink-soft)", border: cat === c ? "none" : "1px solid var(--line-strong)" }}>{c}</button>
                ))}
              </div>
              <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
                <div style={{ position: "relative" }}>
                  <span style={{ position: "absolute", left: 11, top: "50%", transform: "translateY(-50%)", color: "var(--muted)", fontSize: 16 }}><Search /></span>
                  <input value={q} onChange={e => setQ(e.target.value)} placeholder="Search" className="at-field" style={{ paddingLeft: 34, width: 160 }} />
                </div>
                <select value={sort} onChange={e => setSort(e.target.value)} className="at-field" style={{ width: 150 }}>
                  <option value="featured">Featured</option>
                  <option value="low">Price: Low–High</option>
                  <option value="high">Price: High–Low</option>
                </select>
              </div>
            </div>
          </div>

          <section style={{ maxWidth: 1240, margin: "0 auto", padding: "28px 24px 80px" }}>
            {visible.length === 0 ? (
              <div style={{ textAlign: "center", padding: "80px 0", color: "var(--muted)" }}>
                <p style={{ fontSize: 15 }}>Nothing matches that yet. Try another category or clear your search.</p>
              </div>
            ) : (
              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(230px,1fr))", gap: 20 }}>
                {visible.map(p => (
                  <article key={p.id} className="at-prod at-rise" onClick={() => setQuick(p)}>
                    <div className="at-prod-imgwrap" style={{ position: "relative" }}>
                      <ProductImage product={p} className="at-prod-img" />
                      {p.stock === 0 && <span className="at-badge" style={{ position: "absolute", top: 12, left: 12, background: "var(--ink)", color: "var(--paper)" }}>Sold out</span>}
                      {p.stock > 0 && p.stock <= 5 && <span className="at-badge" style={{ position: "absolute", top: 12, left: 12, background: "var(--warn-tint)", color: "var(--warn)" }}>Low stock</span>}
                    </div>
                    <div style={{ padding: "14px 14px 16px" }}>
                      <div className="at-eyebrow" style={{ marginBottom: 6 }}>{p.category}</div>
                      <div className="at-disp" style={{ fontSize: 15, fontWeight: 600, lineHeight: 1.25 }}>{p.name}</div>
                      <div className="at-mono" style={{ fontSize: 14, marginTop: 8 }}>{money(p.price)}</div>
                    </div>
                  </article>
                ))}
              </div>
            )}
          </section>

          <footer style={{ borderTop: "1px solid var(--line)", background: "linear-gradient(135deg, #1A1420 0%, #241A33 55%, #2E1F1A 100%)", color: "var(--paper)" }}>
            <div style={{ maxWidth: 1240, margin: "0 auto", padding: "56px 24px 28px" }}>
              <div style={{ display: "grid", gridTemplateColumns: "1.3fr 1fr 1fr", gap: 40 }} className="at-footer-grid">
                <div>
                  {settings.logo ? (
                    <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                      <img src={settings.logo} alt={settings.brand} style={{ height: 52, width: "auto", maxWidth: 220, borderRadius: "50%" }} />
                      <span className="at-disp" style={{ fontSize: 16, letterSpacing: ".24em", fontWeight: 700 }}>{settings.brand}</span>
                    </div>
                  ) : (
                    <div className="at-disp" style={{ fontSize: 18, letterSpacing: ".24em", fontWeight: 700 }}>{settings.brand}</div>
                  )}
                  <p style={{ color: "rgba(241,240,236,.6)", fontSize: 13, lineHeight: 1.7, marginTop: 14, maxWidth: 280 }}>{settings.tagline}</p>
                </div>

                <div>
                  <div className="at-eyebrow" style={{ color: "rgba(241,240,236,.5)", marginBottom: 16 }}>Contact</div>
                  <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 10, fontSize: 13, color: "rgba(241,240,236,.85)" }}>
                      <span style={{ opacity: 0.75, color: "var(--gold)" }}><MapPin /></span> {settings.address}
                    </div>
                    <a href={`tel:+${bdIntl(settings.phone)}`} style={{ display: "flex", alignItems: "center", gap: 10, fontSize: 13, color: "rgba(241,240,236,.85)", textDecoration: "none" }}>
                      <span style={{ opacity: 0.75, color: "var(--gold)" }}><Phone /></span> {settings.phone}
                    </a>
                    <a href={`https://wa.me/${bdIntl(settings.whatsapp)}`} target="_blank" rel="noopener noreferrer" style={{ display: "flex", alignItems: "center", gap: 10, fontSize: 13, color: "rgba(241,240,236,.85)", textDecoration: "none" }}>
                      <Whatsapp /> {settings.whatsapp}
                    </a>
                  </div>
                </div>

                <div>
                  <div className="at-eyebrow" style={{ color: "rgba(241,240,236,.5)", marginBottom: 16 }}>Follow us</div>
                  <a href={settings.facebook} target="_blank" rel="noopener noreferrer" style={{ display: "flex", alignItems: "center", gap: 10, fontSize: 13, color: "rgba(241,240,236,.85)", textDecoration: "none" }}>
                    <Facebook /> Facebook Page
                  </a>
                </div>
              </div>

              <div style={{ borderTop: "1px solid rgba(255,255,255,.12)", marginTop: 44, paddingTop: 20, display: "flex", flexWrap: "wrap", gap: 14, justifyContent: "space-between", alignItems: "center" }}>
                <div className="at-mono" style={{ fontSize: 11, color: "rgba(241,240,236,.55)" }}>© {new Date().getFullYear()} {settings.brand} — All rights reserved</div>
                <a href={settings.adminUrl} target="_blank" rel="noopener noreferrer" className="at-btn at-btn-sm" style={{ background: "rgba(255,255,255,.08)", color: "var(--paper)", textDecoration: "none" }}>
                  <Lock /> Admin panel
                </a>
              </div>
            </div>
          </footer>

          {quick && <QuickView product={quick} settings={settings} money={money} onClose={() => setQuick(null)} onAdd={addToCart} />}

          {cartOpen && (
            <>
              <div className="at-scrim" onClick={() => setCartOpen(false)} />
              <aside className="at-drawer at-scroll">
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "20px 22px", borderBottom: "1px solid var(--line)" }}>
                  <div className="at-disp" style={{ fontSize: 16, fontWeight: 700 }}>Your bag · {cartCount}</div>
                  <button onClick={() => setCartOpen(false)} style={{ fontSize: 20 }}><X /></button>
                </div>
                <div style={{ flex: 1, overflow: "auto", padding: "8px 0" }} className="at-scroll">
                  {cart.length === 0 ? (
                    <div style={{ textAlign: "center", padding: "60px 24px", color: "var(--muted)" }}>
                      <span style={{ fontSize: 32, opacity: 0.4 }}><ShoppingBag /></span>
                      <p style={{ marginTop: 14, fontSize: 14 }}>Your bag is empty.</p>
                      <button onClick={() => setCartOpen(false)} className="at-btn at-btn-ghost at-btn-sm" style={{ marginTop: 16 }}>Continue shopping</button>
                    </div>
                  ) : cart.map(i => (
                    <div key={i.key} style={{ display: "flex", gap: 12, padding: "14px 22px", borderBottom: "1px solid var(--line)" }}>
                      <div style={{ width: 72, height: 72, flexShrink: 0, overflow: "hidden", background: "var(--paper)" }}><ProductImage product={i} /></div>
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div className="at-disp" style={{ fontSize: 13, fontWeight: 600 }}>{i.name}</div>
                        <div className="at-mono" style={{ fontSize: 11, color: "var(--muted)", marginTop: 3 }}>Size {i.size}</div>
                        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginTop: 10 }}>
                          <div style={{ display: "flex", alignItems: "center", border: "1px solid var(--line-strong)", borderRadius: 2 }}>
                            <button onClick={() => updateQty(i.key, -1)} style={{ padding: "6px 9px", fontSize: 18 }}><Minus /></button>
                            <span className="at-mono" style={{ fontSize: 13, minWidth: 22, textAlign: "center" }}>{i.qty}</span>
                            <button onClick={() => updateQty(i.key, 1)} style={{ padding: "6px 9px", fontSize: 18 }}><Plus /></button>
                          </div>
                          <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                            <span className="at-mono" style={{ fontSize: 13 }}>{money(i.price * i.qty)}</span>
                            <button onClick={() => removeItem(i.key)} style={{ color: "var(--muted)", fontSize: 18 }}><Trash2 /></button>
                          </div>
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
                {cart.length > 0 && (
                  <div style={{ borderTop: "1px solid var(--line)", padding: "18px 22px" }}>
                    <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13, marginBottom: 8 }}>
                      <span style={{ color: "var(--muted)" }}>Subtotal</span><span className="at-mono">{money(subtotal)}</span>
                    </div>
                    <div className="at-mono" style={{ fontSize: 11, color: "var(--muted)", marginBottom: 14 }}>Shipping calculated at checkout</div>
                    <button onClick={() => {
                      setCartOpen(false);
                      if (!customer) { setAuthMode("signin"); setAfterAuth("checkout"); setAuthOpen(true); }
                      else setView("checkout");
                    }} className="at-btn at-btn-primary" style={{ width: "100%" }}>
                      Checkout · {money(subtotal)} <ArrowRight />
                    </button>
                  </div>
                )}
              </aside>
            </>
          )}

          {authOpen && (
            <AccountAuth
              mode={authMode} setMode={setAuthMode}
              onSignIn={onSignIn} onSignUp={onSignUp}
              onClose={() => { setAuthOpen(false); setAfterAuth(null); }}
              onSuccess={() => {
                setAuthOpen(false);
                if (afterAuth === "checkout") { setAfterAuth(null); setView("checkout"); }
              }}
            />
          )}
        </div>
      );
    }

    function AccountAuth({ mode, setMode, onSignIn, onSignUp, onClose, onSuccess }) {
      const [form, setForm] = useState({ name: "", email: "", phone: "", location: "dhaka", password: "", confirm: "" });
      const [err, setErr] = useState("");
      const [busy, setBusy] = useState(false);
      const set = (k) => (e) => setForm(f => ({ ...f, [k]: e.target.value }));

      const submit = async () => {
        if (busy) return;
        setErr("");
        if (mode === "signup") {
          if (!form.name.trim()) return setErr("Please enter your full name.");
          if (!/\S+@\S+\.\S+/.test(form.email)) return setErr("Please enter a valid email.");
          if (!form.phone.trim()) return setErr("Please enter your mobile number.");
          if (form.password.length < 6) return setErr("Password must be at least 6 characters.");
          if (form.password !== form.confirm) return setErr("Passwords don't match.");
          setBusy(true);
          const result = await onSignUp({ name: form.name, email: form.email, phone: form.phone, location: form.location, password: form.password });
          setBusy(false);
          if (!result.ok) return setErr(result.error);
          onSuccess();
        } else {
          if (!form.email.trim() || !form.password) return setErr("Enter your email and password.");
          setBusy(true);
          const result = await onSignIn({ email: form.email, password: form.password });
          setBusy(false);
          if (!result.ok) return setErr(result.error);
          onSuccess();
        }
      };
      const onEnter = (e) => { if (e.key === "Enter") submit(); };

      return (
        <>
          <div className="at-scrim" onClick={onClose} />
          <div className="at-modal">
            <div className="at-card at-rise" style={{ maxWidth: 400, width: "100%", padding: 32 }} onClick={e => e.stopPropagation()}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                <h2 className="at-disp" style={{ fontSize: 20, fontWeight: 700 }}>{mode === "signup" ? "Create your account" : "Sign in"}</h2>
                <button onClick={onClose} style={{ color: "var(--muted)", fontSize: 18 }}><X /></button>
              </div>
              <p style={{ color: "var(--muted)", fontSize: 13, marginBottom: 20 }}>
                {mode === "signup" ? "You'll need an account to place an order." : "Sign in to continue to checkout."}
              </p>
              <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                {mode === "signup" && (
                  <div>
                    <label className="at-label">Full name</label>
                    <input className="at-field" value={form.name} onChange={set("name")} placeholder="Ava Lindqvist" />
                  </div>
                )}
                <div>
                  <label className="at-label">Email</label>
                  <input className="at-field" type="email" value={form.email} onChange={set("email")} placeholder="you@email.com" />
                </div>
                {mode === "signup" && (
                  <>
                    <div>
                      <label className="at-label">Mobile number</label>
                      <input className="at-field at-mono" value={form.phone} onChange={set("phone")} placeholder="01XXXXXXXXX" />
                    </div>
                    <div>
                      <label className="at-label">Delivery location</label>
                      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                        {[{ id: "dhaka", label: "Inside Dhaka" }, { id: "outside", label: "Outside Dhaka" }].map(opt => (
                          <button key={opt.id} type="button" onClick={() => setForm(f => ({ ...f, location: opt.id }))} className="at-field"
                            style={{ textAlign: "left", cursor: "pointer", border: "1px solid " + (form.location === opt.id ? "var(--ink)" : "var(--line-strong)"), background: form.location === opt.id ? "var(--ink)" : "transparent", color: form.location === opt.id ? "var(--paper)" : "var(--ink)" }}>
                            {opt.label}
                          </button>
                        ))}
                      </div>
                    </div>
                  </>
                )}
                <div>
                  <label className="at-label">Password</label>
                  <input className="at-field at-mono" type="password" value={form.password} onChange={set("password")} onKeyDown={mode === "signup" ? undefined : onEnter} placeholder="••••••" />
                </div>
                {mode === "signup" && (
                  <div>
                    <label className="at-label">Confirm password</label>
                    <input className="at-field at-mono" type="password" value={form.confirm} onChange={set("confirm")} onKeyDown={onEnter} placeholder="••••••" />
                  </div>
                )}
              </div>
              {err && <p style={{ color: "var(--warn)", fontSize: 12, marginTop: 10 }}>{err}</p>}

                {mode === "signup" ? "Already have an account? Sign in" : "New here? Create an account"}

          </div>
        </>

    function QuickView({ product, settings, money, onClose, onAdd }) {

        <>
          <div className="at-scrim" onClick={onClose} />

              <div style={{ aspectRatio: "1/1", background: "var(--paper)", minWidth: 0 }}><ProductImage product={product} /></div>

                <div className="at-mono" style={{ fontSize: 18, marginTop: 10 }}>{money(product.price)}</div>

    function Checkout({ cart, subtotal, settings, money, customer, onBack, onComplete }) {
      const [form, setForm] = useState({ name: customer?.name || "", email: customer?.email || "", address: "", city: "", zip: "", card: "", exp: "", cvc: "", trxId: "" });
      const [location, setLocation] = useState(customer?.location || "dhaka");
      const [payMethod, setPayMethod] = useState("card");
      const [processing, setProcessing] = useState(false);
      const set = (k) => (e) => setForm(f => ({ ...f, [k]: e.target.value }));
      const cardFmt = (v) => v.replace(/\D/g, "").slice(0, 16).replace(/(.{4})/g, "$1 ").trim();
      const expFmt = (v) => v.replace(/\D/g, "").slice(0, 4).replace(/(.{2})(.+)/, "$1/$2");
      const shipping = location === "dhaka" ? settings.shipInsideDhaka : settings.shipOutsideDhaka;
      const total = subtotal + shipping;
      const mobileBankingNumber = payMethod === "bkash" ? settings.bkashNumber : payMethod === "nagad" ? settings.nagadNumber : "";

      const missing = [];
      if (!form.name.trim()) missing.push("full name");
      if (!/\S+@\S+\.\S+/.test(form.email)) missing.push("a valid email");
      if (!form.address.trim()) missing.push("address");
      if (!form.city.trim()) missing.push("city");
      if (payMethod === "card") {
        if (form.card.replace(/\s/g, "").length !== 16) missing.push("a 16-digit card number");
        if (form.exp.length !== 5) missing.push("card expiry (MM/YY)");
        if (form.cvc.length < 3) missing.push("CVC");
      }
      if ((payMethod === "bkash" || payMethod === "nagad") && form.trxId.trim().length < 6) {
        missing.push("the Transaction ID from your " + (payMethod === "bkash" ? "bKash" : "Nagad") + " Send Money");
      }
      const valid = missing.length === 0;

      const submit = () => {
        if (!valid || processing) return;
        setProcessing(true);
        setTimeout(() => {
          let payment;
          if (payMethod === "cod") payment = { method: "cod" };
          else if (payMethod === "bkash" || payMethod === "nagad") payment = { method: payMethod, trxId: form.trxId.trim(), number: mobileBankingNumber };
          else payment = { method: "card", brand: "Visa", last4: form.card.replace(/\s/g, "").slice(-4) };
          onComplete(
            { name: form.name, email: form.email, address: `${form.address}, ${form.city} ${form.zip}` },
            payment,
            shipping
          );
        }, 1400);
      };

      return (
        <div style={{ minHeight: "100vh" }}>
          <header style={{ borderBottom: "1px solid var(--line)" }}>
            <div style={{ maxWidth: 1080, margin: "0 auto", padding: "0 24px", height: 68, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
              <button onClick={onBack} style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 13, color: "var(--muted)", border: "none", background: "transparent", cursor: "pointer" }}><ArrowLeft /> Back to store</button>
              {settings.logo ? (
                <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                  <img src={settings.logo} alt={settings.brand} style={{ height: 48, width: "auto", maxWidth: 220, borderRadius: "50%" }} />
                  <span className="at-disp" style={{ fontSize: 16, letterSpacing: ".24em", fontWeight: 700 }}>{settings.brand}</span>
                </div>
              ) : (
                <div className="at-disp" style={{ fontSize: 18, letterSpacing: ".24em", fontWeight: 700 }}>{settings.brand}</div>
              )}
            </div>
          </header>
          <div style={{ maxWidth: 1080, margin: "0 auto", padding: "40px 24px", display: "grid", gridTemplateColumns: "1.6fr 1fr", gap: 40 }}>
            <div>
              <h1 className="at-disp" style={{ fontSize: 28, fontWeight: 700, marginBottom: 4 }}>Checkout</h1>
              <span className="at-badge" style={{ background: "var(--accent-tint)", color: "var(--accent)", marginBottom: 24 }}>Test mode — no real charge</span>

              <section style={{ marginTop: 28 }}>
                <div className="at-eyebrow" style={{ marginBottom: 14 }}>01 — Contact & shipping</div>
                <Field label="Full name" value={form.name} onChange={set("name")} placeholder="Ava Lindqvist" />
                <Field label="Email" value={form.email} onChange={set("email")} placeholder="you@email.com" type="email" />
                <Field label="Address" value={form.address} onChange={set("address")} placeholder="12 Market St" />
                <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr", gap: 12 }}>
                  <Field label="City" value={form.city} onChange={set("city")} placeholder="Dhaka" />
                  <Field label="ZIP (optional)" value={form.zip} onChange={set("zip")} placeholder="1212" />
                </div>
                <div style={{ marginBottom: 14 }}>
                  <label className="at-label">Delivery location</label>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                    {[{ id: "dhaka", label: "Inside Dhaka", rate: settings.shipInsideDhaka }, { id: "outside", label: "Outside Dhaka", rate: settings.shipOutsideDhaka }].map(opt => (
                      <button key={opt.id} type="button" onClick={() => setLocation(opt.id)} className="at-field"
                        style={{ textAlign: "left", cursor: "pointer", border: "1px solid " + (location === opt.id ? "var(--ink)" : "var(--line-strong)"), background: location === opt.id ? "var(--ink)" : "transparent", color: location === opt.id ? "var(--paper)" : "var(--ink)" }}>
                        {opt.label} <span className="at-mono" style={{ fontSize: 12, opacity: 0.75 }}>· {money(opt.rate)}</span>
                      </button>
                    ))}
                  </div>
                </div>
              </section>

              <section style={{ marginTop: 28 }}>
                <div className="at-eyebrow" style={{ marginBottom: 14, display: "flex", alignItems: "center", gap: 8 }}><CreditCard /> 02 — Payment</div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 16 }}>
                  <button type="button" onClick={() => setPayMethod("card")} className="at-field"
                    style={{ textAlign: "left", cursor: "pointer", border: "1px solid " + (payMethod === "card" ? "var(--ink)" : "var(--line-strong)"), background: payMethod === "card" ? "var(--ink)" : "transparent", color: payMethod === "card" ? "var(--paper)" : "var(--ink)" }}>
                    Card
                  </button>
                  <button type="button" onClick={() => setPayMethod("cod")} className="at-field"
                    style={{ textAlign: "left", cursor: "pointer", border: "1px solid " + (payMethod === "cod" ? "var(--ink)" : "var(--line-strong)"), background: payMethod === "cod" ? "var(--ink)" : "transparent", color: payMethod === "cod" ? "var(--paper)" : "var(--ink)" }}>
                    Cash on delivery
                  </button>
                  <button type="button" onClick={() => setPayMethod("bkash")} className="at-field"
                    style={{ textAlign: "left", cursor: "pointer", border: "1px solid " + (payMethod === "bkash" ? "var(--ink)" : "var(--line-strong)"), background: payMethod === "bkash" ? "var(--ink)" : "transparent", color: payMethod === "bkash" ? "var(--paper)" : "var(--ink)" }}>
                    bKash
                  </button>
                  <button type="button" onClick={() => setPayMethod("nagad")} className="at-field"
                    style={{ textAlign: "left", cursor: "pointer", border: "1px solid " + (payMethod === "nagad" ? "var(--ink)" : "var(--line-strong)"), background: payMethod === "nagad" ? "var(--ink)" : "transparent", color: payMethod === "nagad" ? "var(--paper)" : "var(--ink)" }}>
                    Nagad
                  </button>
                </div>
                {payMethod === "card" ? (
                  <>
                    <Field label="Card number" value={form.card} onChange={(e) => setForm(f => ({ ...f, card: cardFmt(e.target.value) }))} placeholder="4242 4242 4242 4242" mono />
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                      <Field label="Expiry" value={form.exp} onChange={(e) => setForm(f => ({ ...f, exp: expFmt(e.target.value) }))} placeholder="12/28" mono />
                      <Field label="CVC" value={form.cvc} onChange={(e) => setForm(f => ({ ...f, cvc: e.target.value.replace(/\D/g, "").slice(0, 4) }))} placeholder="123" mono />
                    </div>
                    <p className="at-mono" style={{ fontSize: 11, color: "var(--muted)", marginTop: 4 }}>Use any 16-digit number — this is a demo gateway.</p>
                  </>
                ) : payMethod === "cod" ? (
                  <p style={{ color: "var(--ink-soft)", fontSize: 13, lineHeight: 1.6 }}>Pay in cash when your order arrives. Please have {money(total)} ready for the courier.</p>
                ) : (
                  <div className="at-card" style={{ padding: 16, background: "var(--accent-tint)", border: "none" }}>
                    <p style={{ color: "var(--ink-soft)", fontSize: 13, lineHeight: 1.6, marginBottom: 12 }}>
                      Send <b className="at-mono">{money(total)}</b> to this {payMethod === "bkash" ? "bKash" : "Nagad"} number via <b>Send Money</b>:
                    </p>
                    <div className="at-mono" style={{ fontSize: 18, fontWeight: 700, marginBottom: 14 }}>{mobileBankingNumber}</div>
                    <Field label="Transaction ID (TrxID)" value={form.trxId} onChange={set("trxId")} placeholder="e.g. 8N7C6X5D4E" mono />
                    <p className="at-mono" style={{ fontSize: 11, color: "var(--muted)" }}>We'll verify this before confirming your order.</p>
                  </div>
                )}
              </section>

              <button onClick={submit} disabled={!valid || processing} className="at-btn at-btn-primary" style={{ width: "100%", marginTop: 28, padding: "15px" }}>
                {processing
                  ? (payMethod === "card" ? "Processing payment…" : "Placing order…")
                  : payMethod === "card" ? <>Pay {money(total)} <Lock /></>
                  : payMethod === "cod" ? <>Place order · {money(total)} <ArrowRight /></>
                  : <>Confirm order · {money(total)} <ArrowRight /></>}
              </button>
              {!valid && !processing && (
                <p className="at-mono" style={{ fontSize: 11, color: "var(--warn)", marginTop: 10, textAlign: "center" }}>
                  Still needed: {missing.join(", ")}
                </p>
              )}
            </div>

            <aside>
              <div className="at-card" style={{ padding: 22, position: "sticky", top: 24 }}>
                <div className="at-eyebrow" style={{ marginBottom: 16 }}>Order summary</div>
                {cart.map(i => (
                  <div key={i.key} style={{ display: "flex", gap: 12, marginBottom: 14 }}>
                    <div style={{ width: 50, height: 50, flexShrink: 0, overflow: "hidden", background: "var(--paper)" }}><ProductImage product={i} /></div>
                    <div style={{ flex: 1 }}>
                      <div className="at-disp" style={{ fontSize: 13, fontWeight: 600 }}>{i.name}</div>
                      <div className="at-mono" style={{ fontSize: 11, color: "var(--muted)" }}>{i.size} · ×{i.qty}</div>
                    </div>
                    <div className="at-mono" style={{ fontSize: 13 }}>{money(i.price * i.qty)}</div>
                  </div>
                ))}
                <div style={{ borderTop: "1px solid var(--line)", marginTop: 8, paddingTop: 14 }}>
                  <Row label="Subtotal" value={money(subtotal)} />
                  <Row label="Shipping" value={money(shipping)} />
                  <div style={{ display: "flex", justifyContent: "space-between", marginTop: 12, paddingTop: 12, borderTop: "1px solid var(--line)" }}>
                    <span className="at-disp" style={{ fontWeight: 700 }}>Total</span>
                    <span className="at-mono" style={{ fontWeight: 700, fontSize: 16 }}>{money(total)}</span>
                  </div>
                </div>
              </div>
            </aside>
          </div>
        </div>
      );
    }
    const Row = ({ label, value }) => (
      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13, marginBottom: 6 }}>
        <span style={{ color: "var(--muted)" }}>{label}</span><span className="at-mono">{value}</span>
      </div>
    );
    const Field = ({ label, mono, ...props }) => (
      <div style={{ marginBottom: 14 }}>
        <label className="at-label">{label}</label>
        <input className={"at-field" + (mono ? " at-mono" : "")} {...props} />
      </div>
    );

    function Confirmation({ order, settings, money, onDone }) {
      const method = order.payment.method;
      const dueLabel = method === "card" ? "Paid" : method === "cod" ? "Due on delivery" : "Awaiting verification";
      const paymentLabel = method === "cod" ? "Cash on delivery"
        : method === "card" ? `${order.payment.brand} ···· ${order.payment.last4}`
        : `${method === "bkash" ? "bKash" : "Nagad"} · TrxID ${order.payment.trxId}`;
      return (
        <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }}>
          <div className="at-card at-rise" style={{ maxWidth: 460, width: "100%", padding: 40, textAlign: "center" }}>
            <div style={{ width: 56, height: 56, borderRadius: "50%", background: "var(--live-tint)", color: "var(--live)", display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 20px", fontSize: 28 }}>
              <Check />
            </div>
            <h1 className="at-disp" style={{ fontSize: 24, fontWeight: 700 }}>Order confirmed</h1>
            <p style={{ color: "var(--ink-soft)", fontSize: 14, marginTop: 8 }}>Thanks, {order.customer.name.split(" ")[0]}. A receipt is on its way to {order.customer.email}.</p>
            <div className="at-card" style={{ padding: 18, marginTop: 24, textAlign: "left", background: "var(--paper)" }}>
              <Row label="Order number" value={order.id} />
              <Row label="Items" value={order.items.reduce((s, i) => s + i.qty, 0)} />
              <Row label={dueLabel} value={money(order.total)} />
              <Row label="Payment" value={paymentLabel} />
            </div>
            <button onClick={onDone} className="at-btn at-btn-dark" style={{ width: "100%", marginTop: 24 }}>Continue shopping</button>
            <p className="at-mono" style={{ fontSize: 11, color: "var(--muted)", marginTop: 14 }}>This order is now live in the admin dashboard.</p>
          </div>
        </div>
      );
    }

    function Admin({ products, orders, settings, money, staff, currentUser, notify, placeOrder, onSignIn, onExit, onReset }) {
      const [username, setUsername] = useState("");
      const [pass, setPass] = useState("");
      const [show, setShow] = useState(false);
      const [err, setErr] = useState("");
      const [busy, setBusy] = useState(false);
      const [nav, setNav] = useState("dashboard");

      if (!currentUser) {
        const attempt = async () => {
          if (busy) return;
          setErr(""); setBusy(true);
          const result = await onSignIn({ email: username, password: pass });
          if (!result.ok) { setErr(result.error); setBusy(false); return; }
          const staffSnap = await db.collection("staff").doc(auth.currentUser.uid).get();
          if (!staffSnap.exists) {
            await auth.signOut();
            setErr("This account doesn't have admin access.");
            setBusy(false);
            return;
          }
          setBusy(false);
        };
        return (
          <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }}>
            <style>{STYLES}</style>
            <div className="at-card at-rise" style={{ maxWidth: 380, width: "100%", padding: 36 }}>
              {settings.logo ? (
                <div style={{ textAlign: "center", marginBottom: 16 }}>
                  <img src={settings.logo} alt={settings.brand} style={{ height: 64, width: "auto", maxWidth: 280, borderRadius: "50%" }} />
                  <div className="at-disp" style={{ fontSize: 18, letterSpacing: ".24em", fontWeight: 700, marginTop: 10 }}>{settings.brand}</div>
                </div>
              ) : (
                <div className="at-disp" style={{ fontSize: 20, letterSpacing: ".24em", fontWeight: 700, textAlign: "center" }}>{settings.brand}</div>
              )}
              <div className="at-eyebrow" style={{ textAlign: "center", marginTop: 6, marginBottom: 28 }}>Operations · Admin access</div>
              <label className="at-label">Email</label>
              <input value={username} autoFocus type="email"
                onChange={e => setUsername(e.target.value)} onKeyDown={e => e.key === "Enter" && attempt()}
                className="at-field" placeholder="admin@yourdomain.com" style={{ marginBottom: 14 }} />
              <label className="at-label">Password</label>
              <div style={{ position: "relative" }}>
                <input type={show ? "text" : "password"} value={pass}
                  onChange={e => setPass(e.target.value)} onKeyDown={e => e.key === "Enter" && attempt()}
                  className="at-field at-mono" placeholder="••••••" style={{ paddingRight: 40 }} />
                <button onClick={() => setShow(s => !s)} style={{ position: "absolute", right: 10, top: "50%", transform: "translateY(-50%)", color: "var(--muted)", fontSize: 16 }}>{show ? <EyeOff /> : <Eye />}</button>
              </div>
              {err && <p style={{ color: "var(--warn)", fontSize: 12, marginTop: 8 }}>{err}</p>}
              <button onClick={attempt} disabled={busy} className="at-btn at-btn-dark" style={{ width: "100%", marginTop: 20 }}>{busy ? "Signing in…" : "Enter dashboard"}</button>
              <button onClick={onExit} style={{ width: "100%", marginTop: 16, fontSize: 12, color: "var(--muted)" }}>← Back to storefront</button>
            </div>
          </div>
        );
      }

      const isSuperAdmin = currentUser.role === "super_admin";
      const NAV = [
        { id: "dashboard", label: "Dashboard", icon: LayoutDashboard, color: "#5B8DEF" },
        { id: "pos", label: "POS", icon: ShoppingCart, color: "#2E8B57" },
        { id: "products", label: "Products", icon: Package, color: "#7C8B6E" },
        { id: "orders", label: "Orders", icon: Receipt, color: "#D6A756" },
        { id: "settings", label: "Settings", icon: SettingsIcon, color: "#C77B9C" },
        ...(isSuperAdmin ? [{ id: "users", label: "Users", icon: UsersIcon, color: "#5BC0BE" }] : []),
      ];

      return (
        <div style={{ display: "flex", minHeight: "100vh" }}>
          <aside style={{ width: 232, background: "linear-gradient(180deg, #1A1420 0%, #241A33 55%, #2E1F1A 100%)", color: "var(--paper)", padding: "24px 16px", display: "flex", flexDirection: "column", position: "sticky", top: 0, height: "100vh", flexShrink: 0 }}>
            {settings.logo ? (
              <div style={{ marginBottom: 20, padding: "0 10px" }}>
                <img src={settings.logo} alt={settings.brand} style={{ height: 56, width: "auto", maxWidth: 220, borderRadius: "50%" }} />
                <div className="at-disp" style={{ fontSize: 14, letterSpacing: ".2em", fontWeight: 700, marginTop: 10 }}>{settings.brand}</div>
              </div>
            ) : (
              <div className="at-disp" style={{ fontSize: 16, letterSpacing: ".24em", fontWeight: 700, marginBottom: 20, padding: "0 10px" }}>{settings.brand}</div>
            )}
            <div style={{ padding: "0 10px", marginBottom: 20, display: "flex", alignItems: "center", gap: 8 }}>
              <span className="at-mono" style={{ fontSize: 12, color: "rgba(241,240,236,.7)" }}>{currentUser.name}</span>
              <span className="at-badge" style={{ background: isSuperAdmin ? "rgba(91,192,190,.18)" : "rgba(255,255,255,.1)", color: isSuperAdmin ? "#5BC0BE" : "rgba(241,240,236,.7)", fontSize: 9 }}>
                {isSuperAdmin ? "Super admin" : "Admin"}
